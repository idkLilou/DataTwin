services:
  datatwin:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: datatwin
    env_file:
      - ./app/.env
    ports:
      - "8000:8000"
    volumes:
      - datatwin_data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: datatwin_postgres
    env_file:
      - ./bdd/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datatwin_pgadmin
    env_file:
      - ./bdd/.env
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres


volumes:
  datatwin_data:
  postgres_data:
  pgadmin_data: